<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Larick Industries - Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --accent: #000000;
            --light-gray: #f9f9f9;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-color);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid #eee;
        }
        .logo-section { display: flex; align-items: center; gap: 15px; font-weight: bold; }
        nav ul { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: var(--text-main); font-size: 0.9rem; }
        .auth-buttons { display: flex; gap: 15px; }
        .btn-login { text-decoration: none; color: var(--text-main); font-size: 0.9rem; align-self: center;}
        .btn-signup { background: var(--accent); color: white; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-size: 0.9rem; }

        .hero {
            position: relative;
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; max-width: 800px; margin-bottom: 20px; }
        .hero .btn-main { background: white; color: black; padding: 15px 40px; border-radius: 30px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .hero .btn-main:hover { transform: scale(1.05); }

        footer {
            background: var(--light-gray);
            padding: 50px 5%;
            text-align: center;
            border-top: 1px solid #eee;
        }
        .footer-links { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; }
        .footer-links a { color: #666; text-decoration: none; font-size: 0.9rem; }
        .copyright { font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
             <span>Larick Industries</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="salles.html">Salles</a></li>
                <li><a href="materiel.html">Matériel</a></li>
            </ul>
        </nav>
        <div class="auth-buttons">
            <a href="log in.html" class="btn-login">Log in</a>
            <a href="sign up.html" class="btn-signup">Sign up</a>
        </div>
    </header>

    <main class="hero">
        <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;">Larick Industries</p>
        <h1>Simplifiez l’organisation de vos événements : de la salle au vidéoprojecteur.</h1>
        <a href="salles.html" class="btn-main">Réserver maintenant</a>
    </main>

    <footer>
        <div class="footer-links">
            <a href="contact.html">Contact</a>
            <a href="help.html">Help / FAQ</a>
            <a href="#">Mentions Légales</a>
        </div>
        <p class="copyright">© 2026 Larick Industries. Tous droits réservés.</p>
    </footer>
</body>
</html>
