<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Matériel - Larick Industries</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* Styles structurels (Header/Footer identiques) */
        :root { --bg-color: #ffffff; --text-main: #1a1a1a; --accent: #000000; --light-gray: #f9f9f9; }
        body { margin: 0; font-family: 'Inter', sans-serif; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #eee; }
        nav ul { list-style: none; display: flex; gap: 25px; }
        nav a { text-decoration: none; color: black; font-size: 0.9rem; }
        .auth-buttons { display: flex; gap: 15px; }
        .btn-signup { background: black; color: white; padding: 8px 20px; border-radius: 20px; text-decoration: none; }
        
        /* Spécifique à la page Matériel */
        .container { padding: 60px 5%; display: flex; gap: 50px; }
        .filters { width: 250px; border-right: 1px solid #eee; padding-right: 20px; }
        .filters h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
        .filters label { display: block; margin: 10px 0; font-size: 0.9rem; color: #666; cursor: pointer; }
        
        .product-list { flex-grow: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .item { text-align: center; padding: 20px; border: 1px solid transparent; transition: 0.3s; }
        .item:hover { border-color: #eee; }
        .item img { width: 150px; height: 150px; object-fit: contain; margin-bottom: 15px; }
        .item-name { font-weight: bold; margin-bottom: 5px; }
        .item-price { font-size: 0.85rem; color: #888; }
        .add-btn { margin-top: 10px; border: 1px solid black; background: none; padding: 5px 15px; font-size: 0.8rem; cursor: pointer; }
        .add-btn:hover { background: black; color: white; }

        footer { background: var(--light-gray); padding: 50px 5%; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight:bold;">Larick Industries</div>
        <nav><ul><li><a href="index.html">Home</a></li><li><a href="salles.html">Salles</a></li><li><a href="materiel.html">Matériel</a></li></ul></nav>
        <div class="auth-buttons"><a href="log in.html" style="text-decoration:none; color:black; align-self:center;">Log in</a><a href="sign up.html" class="btn-signup">Sign up</a></div>
    </header>

    <div class="container">
        <aside class="filters">
            <h3>Équipements</h3>
            <label><input type="checkbox"> Vidéo & Projection</label>
            <label><input type="checkbox"> Sonorisation</label>
            <label><input type="checkbox"> Mobilier</label>
            <label><input type="checkbox"> Accessoires</label>
        </aside>

        <section class="product-list">
            <div class="item">
                <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&q=80&w=300" alt="Macbook">
                <div class="item-name">Station Macbook Pro 16"</div>
                <div class="item-price">85€ / jour</div>
                <button class="add-btn">Ajouter</button>
            </div>
            <div class="item">
                <img src="https://images.unsplash.com/photo-1543269865-cbf427effbad?auto=format&fit=crop&q=80&w=300" alt="Projecteur">
                <div class="item-name">Vidéoprojecteur 4K</div>
                <div class="item-price">120€ / jour</div>
                <button class="add-btn">Ajouter</button>
            </div>
            <div class="item">
                <img src="https://images.unsplash.com/photo-1590602847861-f357a9332bbc?auto=format&fit=crop&q=80&w=300" alt="Audio">
                <div class="item-name">Enceintes Bose L1</div>
                <div class="item-price">65€ / jour</div>
                <button class="add-btn">Ajouter</button>
            </div>
        </section>
    </div>

    <footer><div style="margin-bottom:20px;"><a href="#" style="margin:0 20px; color:#666; text-decoration:none;">Contact</a><a href="#" style="margin:0 20px; color:#666; text-decoration:none;">Help</a></div><p>© 2026 Larick Industries</p></footer>
</body>
</html>
